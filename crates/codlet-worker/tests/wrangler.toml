# Miniflare configuration for codlet-worker integration tests (RFC-033 §14).
# Run: npx vitest run  (from this directory)
# No Cloudflare account required.

name               = "codlet-worker-test"
main               = "worker.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding       = "DB"
database_name = "codlet-test"
database_id   = "local"

[[kv_namespaces]]
binding = "CODLET_RL"
id      = "local-rl"
